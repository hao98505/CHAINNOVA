name: Anchor Build & Test

on:
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/anchor-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/anchor-build.yml'
  workflow_dispatch:

env:
  SOLANA_CLI_VERSION: "2.1.7"
  ANCHOR_VERSION: "0.30.1"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
          components: rust-src

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: anchor-build-v4-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: anchor-build-v4-

      - name: Install Solana CLI v${{ env.SOLANA_CLI_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_CLI_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Verify Solana CLI
        run: solana --version

      - name: Install Anchor CLI v${{ env.ANCHOR_VERSION }}
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}
          anchor --version

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

      - name: Trigger platform-tools download and patch cargo
        run: |
          anchor build 2>&1 || true
          echo "--- Patching platform-tools cargo with system cargo ---"
          PLATFORM_CARGO=$(find "$HOME/.local/share/solana" -name "cargo" -path "*/platform-tools/rust/bin/*" 2>/dev/null | head -1)
          SYSTEM_CARGO=$(which cargo)
          if [ -n "$PLATFORM_CARGO" ]; then
            echo "Before: $($PLATFORM_CARGO --version 2>/dev/null || echo 'unknown')"
            cp -f "$SYSTEM_CARGO" "$PLATFORM_CARGO"
            echo "After: $($PLATFORM_CARGO --version 2>/dev/null || echo 'patched')"
          else
            echo "ERROR: Could not find platform-tools cargo"
            find "$HOME/.local/share/solana" -name "cargo" 2>/dev/null
            exit 1
          fi

      - name: Anchor build (with patched cargo)
        run: anchor build

      - name: Report build result
        if: success()
        run: |
          BUILT_ID=$(solana-keygen pubkey target/deploy/wforgai_bridge-keypair.json)
          echo "Program .so built successfully"
          echo "CI program ID: $BUILT_ID (ephemeral, from CI-generated keypair)"
          ls -lh target/deploy/wforgai_bridge.so
          file target/deploy/wforgai_bridge.so

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wforgai-bridge-build
          path: |
            target/deploy/wforgai_bridge.so
            target/idl/wforgai_bridge.json
            target/types/wforgai_bridge.ts
