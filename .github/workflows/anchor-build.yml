name: Anchor Build & Test

on:
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 0.30.1
          avm use 0.30.1

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

      - name: Anchor build
        run: anchor build 2>&1

      - name: Report program ID
        run: |
          BUILT_ID=$(solana-keygen pubkey target/deploy/wforgai_bridge-keypair.json)
          echo "Built program ID: $BUILT_ID"
          echo "Note: anchor build auto-syncs declare_id to the CI-generated keypair."
          echo "For deployment, use the real keypair and re-run anchor build locally."

      - name: Verify .so artifact
        run: |
          ls -lh target/deploy/wforgai_bridge.so
          file target/deploy/wforgai_bridge.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wforgai-bridge-build
          path: |
            target/deploy/wforgai_bridge.so
            target/idl/wforgai_bridge.json
            target/types/wforgai_bridge.ts
