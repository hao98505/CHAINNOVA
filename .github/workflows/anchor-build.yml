name: Anchor Build & Test

on:
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/anchor-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/anchor-build.yml'
  workflow_dispatch:

env:
  SOLANA_CLI_VERSION: "2.1.7"
  ANCHOR_VERSION: "0.30.1"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: anchor-build-v2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: anchor-build-v2-

      - name: Install Solana CLI v${{ env.SOLANA_CLI_VERSION }}
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_CLI_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Verify Solana CLI
        run: |
          solana --version
          SBF_CARGO=$(find "$HOME/.local/share/solana" -name "cargo" -path "*/platform-tools/rust/bin/*" 2>/dev/null | head -1)
          if [ -n "$SBF_CARGO" ]; then
            echo "SBF bundled cargo: $($SBF_CARGO --version 2>/dev/null || echo 'unknown')"
          fi

      - name: Install Anchor CLI v${{ env.ANCHOR_VERSION }}
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}
          anchor --version

      - name: Generate keypair
        run: solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json

      - name: Generate lockfile pinning pre-edition2024 deps
        run: |
          cargo generate-lockfile
          echo "Downgrading edition2024 transitive deps for cargo-build-sbf compat..."
          cargo update -p toml_datetime --precise 1.0.1 2>/dev/null || true
          cargo update -p toml_edit --precise 0.22.22 2>/dev/null || true
          cargo update -p winnow --precise 0.6.24 2>/dev/null || true
          # Clear any cached edition2024 crate sources to prevent stale manifests
          find ~/.cargo/registry/src -maxdepth 2 -name "Cargo.toml" -exec grep -l 'edition = "2024"' {} \; 2>/dev/null | while read f; do
            dir=$(dirname "$f")
            echo "Removing cached edition2024 source: $(basename $dir)"
            rm -rf "$dir"
          done

      - name: Anchor build
        run: anchor build

      - name: Report build result
        if: success()
        run: |
          BUILT_ID=$(solana-keygen pubkey target/deploy/wforgai_bridge-keypair.json)
          echo "Program .so built successfully"
          echo "CI program ID: $BUILT_ID (ephemeral, from CI-generated keypair)"
          ls -lh target/deploy/wforgai_bridge.so
          file target/deploy/wforgai_bridge.so

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wforgai-bridge-build
          path: |
            target/deploy/wforgai_bridge.so
            target/idl/wforgai_bridge.json
            target/types/wforgai_bridge.ts
